server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: aurora-read-write-splitter
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
        logging:
          level:
            org.hibernate.SQL: DEBUG
            org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  datasource:
    url: jdbc:mysql://database-1.cluster-c3s62s8yy2tl.eu-west-3.rds.amazonaws.com:3306/database-1
    username: admin
    password: (ixQk(lEyK3UL5KdMHbhRyhC#q7J
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      pool-name: AuroraPool

logging:
  level:
    com.aurora: DEBUG
    com.aurora.routing: DEBUG
    com.aurora.service: DEBUG
    com.aurora.controller: DEBUG
    org.springframework.transaction: DEBUG
    org.springframework.jdbc: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/aurora-read-write-splitter.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

aurora:
  config:
    writer-endpoint: database-1.cluster-c3s62s8yy2tl.eu-west-3.rds.amazonaws.com
    reader-endpoint: database-1.cluster-ro-c3s62s8yy2tl.eu-west-3.rds.amazonaws.com
    database-name: database-1
    username: admin
    password: (ixQk(lEyK3UL5KdMHbhRyhC#q7J
    routing:
      enabled: true
      default-target: WRITER
      read-only-target: READER 