# Configuration spécifique pour Aurora AWS
# Ce profil utilise les variables d'environnement définies dans aurora-config.env

spring:
  application:
    name: aurora-read-write-splitter
  
  # Configuration JPA/Hibernate pour Aurora
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
        # Configuration pour optimiser les performances avec Aurora
        connection:
          provider_disables_autocommit: true
        # Logging des requêtes SQL pour le debugging
        logging:
          level:
            org.hibernate.SQL: DEBUG
            org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  
  # Configuration des DataSources pour Aurora AWS
  datasource:
    # DataSource pour les opérations d'écriture (Writer Endpoint Aurora)
    writer:
      jdbc-url: jdbc:mysql://${AURORA_WRITER_ENDPOINT}:${DB_PORT:3306}/${DB_NAME}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver
      # Configuration du pool de connexions pour les écritures
      hikari:
        maximum-pool-size: 10
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
        connection-test-query: SELECT 1
        pool-name: AuroraWriterPool
    
    # DataSource pour les opérations de lecture (Reader Endpoint Aurora)
    reader:
      jdbc-url: jdbc:mysql://${AURORA_READER_ENDPOINT}:${DB_PORT:3306}/${DB_NAME}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver
      # Configuration du pool de connexions pour les lectures (plus de connexions car plus de requêtes)
      hikari:
        maximum-pool-size: 20
        minimum-idle: 10
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
        connection-test-query: SELECT 1
        pool-name: AuroraReaderPool

# Configuration du logging pour démontrer le routage
logging:
  level:
    com.aurora: DEBUG
    com.aurora.routing: DEBUG
    com.aurora.service: DEBUG
    com.aurora.controller: DEBUG
    org.springframework.transaction: DEBUG
    org.springframework.jdbc: DEBUG
    # Logging spécifique pour voir les requêtes SQL
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/aurora-read-write-splitter.log

# Configuration pour le développement
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Configuration des variables d'environnement pour Aurora
aurora:
  config:
    # Endpoints Aurora (variables d'environnement)
    writer-endpoint: ${AURORA_WRITER_ENDPOINT}
    reader-endpoint: ${AURORA_READER_ENDPOINT}
    database-name: ${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    # Configuration du routage
    routing:
      enabled: true
      default-target: WRITER
      read-only-target: READER 